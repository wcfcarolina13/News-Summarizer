# Render.com deployment config
# Scheduler runs as a background thread inside the Flask web process.
# Use UptimeRobot (free) to ping /health every 5 min to prevent sleep.
# NOTE: Render only reads startCommand on initial service creation.
# If you change it here, also update it in Render Dashboard → Settings → Start Command.
services:
  - type: web
    name: daily-briefing-server
    runtime: python
    rootDir: daily_audio_briefing
    buildCommand: pip install -r requirements-server.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --preload
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SERVER_MODE
        value: "true"
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false  # Paste full JSON of service account credentials
      - key: SCHEDULER_SHEET_ID
        sync: false  # Spreadsheet ID for task persistence across redeploys
      # API cost controls — survive redeploys (api_usage.json is ephemeral)
      - key: API_DAILY_MAX_CALLS
        value: "100"  # Conservative: 100 Gemini calls/day (default 500)
      - key: API_MONTHLY_MAX_CALLS
        value: "2000"  # Conservative: 2000/month (default 10000)
      - key: API_MONTHLY_BUDGET
        value: "0.50"  # Hard dollar cap: $0.50/month on Gemini API
      - key: API_COOLDOWN_ENABLED
        value: "true"  # Stop all API calls when budget is hit
